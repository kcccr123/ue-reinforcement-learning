name: Publish to PyPI

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version_check.outputs.changed }}
      version: ${{ steps.version_check.outputs.current }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check if version changed
        id: version_check
        run: |
          CURRENT=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          pip install uerl 2>/dev/null && PUBLISHED=$(pip show uerl | grep Version | cut -d' ' -f2) || PUBLISHED="none"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PUBLISHED" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PUBLISHED -> $CURRENT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged: $CURRENT — skipping publish"
          fi

      - name: Install build
        if: steps.version_check.outputs.changed == 'true'
        run: pip install build

      - name: Build package
        if: steps.version_check.outputs.changed == 'true'
        run: python -m build

      - name: Upload build artifact
        if: steps.version_check.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    if: needs.build.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/uerl/
    permissions:
      id-token: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
